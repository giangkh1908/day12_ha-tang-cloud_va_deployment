version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - ENVIRONMENT=staging
      - DEFAULT_PROVIDER=${DEFAULT_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MONI_API_KEY=${MONI_API_KEY:-dev-key-change-me}
      - RATE_LIMIT_PER_MINUTE=30
      - DAILY_BUDGET_USD=5.0
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000,https://moni-agent.vercel.app
    env_file:
      - codebase/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
